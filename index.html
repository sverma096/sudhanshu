<!DOCTYPE html>
<html>
<head>
<title>AI SaaS Tools</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}
h1 {
  text-align:center;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}
.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}
button {
  background:#6366f1;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}
input {
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 AI SaaS Tools</h1>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" placeholder="Password" type="password">
<button onclick="login()">Login</button>
</div>

<div class="grid">

<div class="card">
<h3>Merge PDF</h3>
<input type="file" id="pdfFiles" multiple>
<button onclick="mergePDF()">Merge</button>
</div>

<div class="card">
<h3>OCR</h3>
<input type="file" id="ocrFile">
<button onclick="runOCR()">Extract</button>
<p id="ocrResult"></p>
</div>

</div>

</div>

<script>
const API = "http://localhost:5000/api";
let token = "";

// LOGIN
async function login() {
  const res = await fetch(API + "/auth/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();
  token = data.token;
  alert("Login Success");
}

// MERGE PDF
async function mergePDF() {
  const files = document.getElementById("pdfFiles").files;
  const form = new FormData();

  for (let f of files) form.append("files", f);

  const res = await fetch(API + "/tools/merge-pdf", {
    method:"POST",
    headers:{ "Authorization": token },
    body: form
  });

  const blob = await res.blob();
  window.open(URL.createObjectURL(blob));
}

// OCR
async function runOCR() {
  const file = document.getElementById("ocrFile").files[0];
  const form = new FormData();
  form.append("file", file);

  const res = await fetch(API + "/tools/ocr", {
    method:"POST",
    headers:{ "Authorization": token },
    body: form
  });

  const data = await res.json();
  document.getElementById("ocrResult").innerText = data.text;
}
</script>

</body>
</html>
