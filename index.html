<!DOCTYPE html>
<html>
<head>
<title>SaaS Platform</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1200px; margin:auto; padding:20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }
.card { background:#1e293b; padding:20px; border-radius:12px; }
button { background:#6366f1; color:white; padding:10px; border:none; cursor:pointer; }
</style>
</head>

<body>
<div class="container">

<h1>🚀 SaaS Dashboard</h1>

<!-- LOGIN -->
<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- TOOLS -->
<div class="grid">
<div class="card">
<h3>Merge PDF</h3>
<input type="file" id="pdfFiles" multiple>
<button onclick="mergePDF()">Run</button>
</div>

<div class="card">
<h3>OCR</h3>
<input type="file" id="ocrFile">
<button onclick="runOCR()">Run</button>
<p id="ocrResult"></p>
</div>

<div class="card">
<h3>AI Excel</h3>
<input type="file" id="excelFile">
<button onclick="aiExcel()">Run</button>
<p id="excelResult"></p>
</div>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>📊 Usage History</h3>
<button onclick="loadDashboard()">Load</button>
<ul id="history"></ul>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>💰 Upgrade to Pro</h3>
<button onclick="buy()">Subscribe</button>
</div>

</div>

<script>
const API = "https://sudhanshu-backend-1937.onrender.com/api";
let token = "";

// AUTH
async function login() {
  const res = await fetch(API+"/auth/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });
  const data = await res.json();
  token = data.token;
  alert("Logged in");
}

async function register() {
  await fetch(API+"/auth/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });
  alert("Registered");
}

// TOOLS
async function mergePDF() {
  const form = new FormData();
  for (let f of pdfFiles.files) form.append("files", f);

  const res = await fetch(API+"/tools/merge-pdf", {
    method:"POST",
    headers:{Authorization:token},
    body:form
  });

  window.open(URL.createObjectURL(await res.blob()));
}

async function runOCR() {
  const form = new FormData();
  form.append("file", ocrFile.files[0]);

  const res = await fetch(API+"/tools/ocr", {
    method:"POST",
    headers:{Authorization:token},
    body:form
  });

  const data = await res.json();
  ocrResult.innerText = data.text;
}

async function aiExcel() {
  const form = new FormData();
  form.append("file", excelFile.files[0]);

  const res = await fetch(API+"/tools/excel-ai", {
    method:"POST",
    headers:{Authorization:token},
    body:form
  });

  const data = await res.json();
  excelResult.innerText = JSON.stringify(data);
}

// DASHBOARD
async function loadDashboard() {
  const res = await fetch(API+"/dashboard", {
    headers:{Authorization:token}
  });

  const data = await res.json();
  history.innerHTML = data.map(x => `<li>${x.tool}</li>`).join("");
}

// PAYMENT
async function buy() {
  const res = await fetch(API+"/payment/create-checkout", {
    method:"POST"
  });

  const data = await res.json();
  window.location = data.url;
}
</script>

</body>
</html>
